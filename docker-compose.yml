services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      HTTP_ADDR: ":8080"
      MYSQL_DSN: "root:bishe_root@tcp(mysql:3306)/bishe?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
    depends_on:
      - mysql
      - redis
    volumes:
      - ./server/data/uploads:/app/server/data/uploads
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "bishe_root"
      MYSQL_DATABASE: "bishe"
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
